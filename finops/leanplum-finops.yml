description: >-
  FinOps view of Leanplum (Leanplum by CleverTap) spend. Leanplum is an
  enterprise, sales-led SaaS platform with no public per-unit pricing; cost is a
  negotiated annual subscription scoped to tracked/active users, message volume,
  and enabled channels (push, in-app, email, web). The REST API is included in
  the subscription, but usage carries a metering dimension: each unique user
  lookup in an API request is a billable API call, so high-volume server-side
  integrations affect cost. Following the 2022 CleverTap acquisition, invoicing
  and renewals increasingly flow through CleverTap as accounts migrate onto the
  CleverTap platform.
notes: >-
  Per-unit rates are not public and are not reconciled here; obtain a quote from
  Leanplum/CleverTap. The main controllable API cost driver is billable unique
  user lookups - batch efficiently with multi and avoid redundant per-user calls.
  Confirm whether the billing entity is Leanplum or CleverTap for the account.
