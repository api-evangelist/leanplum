meters:
- name: tracked_users
  description: Monthly tracked / active users, the primary contract sizing dimension.
  unit: users
  aggregation: max
  dimensions:
  - account
  - app
- name: messages_sent
  description: Push, in-app, email, and web messages delivered via sendMessage and campaigns.
  unit: messages
  aggregation: sum
  dimensions:
  - account
  - app
  - channel
- name: billable_user_lookups
  description: Unique user lookups in API requests; each unique lookup is a billable API call.
  unit: lookups
  aggregation: sum
  dimensions:
  - account
  - app
- name: data_export_volume
  description: Volume of raw data exported via exportData / exportReport jobs.
  unit: records
  aggregation: sum
  dimensions:
  - account
  - app
principles:
- name: Visibility
  description: Track tracked-user counts, message volume by channel, and billable unique user lookups per app so platform cost drivers are visible.
- name: Allocation
  description: Map apps and campaigns to teams/products so subscription and messaging costs allocate to the owning cost center.
- name: Optimization
  description: Batch API work with multi (up to 50 users / 500 actions) to minimize billable unique user lookups; prune inactive users to control tracked-user sizing; scope exports to needed date ranges.
- name: Accountability
  description: Review the annual subscription against actual tracked users and message volume at renewal; confirm the billing entity (Leanplum vs CleverTap) and migration status.
